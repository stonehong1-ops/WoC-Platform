<!-- BEGIN: LogicScript -->
<script>
  // PWA 서비스 워커 강제 수동 등록
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('WoC 서비스 워커 수동 등록 완료'))
        .catch((err) => console.error('서비스 워커 수동 등록 실패', err));
    });
  }

  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isKakao = /KAKAOTALK/i.test(ua);
  const isLine = /Line/i.test(ua);
  const isFacebook = /FBAV|FBAN/i.test(ua);
  const isInstagram = /Instagram/i.test(ua);
  const isTwitter = /Twitter|TwitterAndroid/i.test(ua);
  const isTikTok = /musical_ly/i.test(ua);
  const inAppDetected = isKakao || isLine || isFacebook || isInstagram || isTwitter || isTikTok;

  let deferredPrompt;
  const installBtn = document.getElementById('install-button');
  const installModal = document.getElementById('install-modal');
  const modalTitle = document.getElementById('modal-title');
  const modalDesc = document.getElementById('modal-desc');
  const closeModal = document.getElementById('close-modal');

  // 단독 앱 실행(Standalone) 여부 체크 및 이중 리다이렉트 가드
  const isAppMode = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isAppMode) {
    window.location.replace('/live');
  }

  // DOM 로드 완료 시점에 최종 재검사
  document.addEventListener('DOMContentLoaded', () => {
    const finalAppMode = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (finalAppMode) {
      window.location.replace('/live');
    }
  });

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  const showGuideModal = (title, desc) => {
    modalTitle.textContent = title;
    modalDesc.innerHTML = desc;
    installModal.classList.remove('hidden');
    setTimeout(() => {
      installModal.querySelector('div').classList.remove('scale-95');
    }, 10);
  };

  closeModal.addEventListener('click', () => {
    installModal.querySelector('div').classList.add('scale-95');
    setTimeout(() => {
      installModal.classList.add('hidden');
    }, 150);
  });

  installBtn.addEventListener('click', async () => {
    // 1. 이미 앱 상태인 경우 즉각 피드백
    if (isAppMode) {
      showGuideModal('이미 설치 완료됨', '이미 TANGO World 앱이 성공적으로 설치되어 실행 중입니다!');
      return;
    }

    // 2. 아이폰(iOS) 사용자인 경우 맞춤형 가이드 제공 (현재 화면에서 할 일)
    if (isIOS) {
      if (inAppDetected) {
        showGuideModal(
          'Safari로 열기 안내 🌐',
          '아이폰 보안 정책상 현재 브라우저 화면에서는 앱을 직접 설치할 수 없습니다.<br/><br/>' +
          '<div class="text-left space-y-3 mt-1 bg-slate-50 p-4 rounded-2xl text-slate-700 text-xs md:text-sm font-semibold">' +
          '<div>1️⃣ 우측 하단의 <strong>[더보기(···) 또는 공유]</strong> 단추를 누릅니다.</div>' +
          '<div>2️⃣ 목록에서 <strong>[Safari로 열기]</strong>를 선택해 사파리로 이동합니다.</div>' +
          '<div>3️⃣ 사파리에서 다시 [앱 설치]를 눌러 <strong>[홈 화면에 추가]</strong>를 진행해 주세요.</div>' +
          '</div>'
        );
      } else {
        showGuideModal(
          '아이폰 설치 안내 📲',
          '실시간 채팅 및 모임 알림을 받으시려면 아래 순서대로 홈 화면에 추가해 주세요.<br/><br/>' +
          '<div class="text-left space-y-3 mt-1 bg-slate-50 p-4 rounded-2xl text-slate-700 text-xs md:text-sm font-semibold">' +
          '<div>1️⃣ Safari 브라우저 하단의 <strong>[공유 버튼 📤]</strong>을 누릅니다.</div>' +
          '<div>2️⃣ 나타나는 목록에서 <strong>[홈 화면에 추가]</strong>를 선택합니다.</div>' +
          '<div>3️⃣ 우측 상단의 <strong>[추가]</strong>를 누르면 알림 수신이 활성화됩니다.</div>' +
          '</div>'
        );
      }
      return;
    }

    // 3. 안드로이드 / 기타 (기존 로직 100% 손대지 않고 보존)
    if (deferredPrompt) {
      try {
        await deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          deferredPrompt = null;
        }
      } catch (err) {
        console.error(err);
        showGuideModal('설치 안내', '이미 앱이 설치되어 있거나, 설치 창이 열리지 않는 경우 브라우저 주소창 옆의 <strong>설치 아이콘(＋)</strong> 또는 <strong>[홈 화면에 추가]</strong>를 눌러 수동으로 진행해 주세요.');
      }
    } else {
      // 부모 창으로 설치 신호 전송 시도
      window.parent.postMessage({ type: 'INSTALL_PWA' }, '*');

      // 기기 잠금/오류로 0.6초 이내에 자동 설치 팝업이 뜨지 않아 포커스(blur)가 이탈되지 않은 경우 안내 모달을 즉시 표시
      let promptFired = false;
      const handleBlur = () => {
        promptFired = true;
      };
      window.addEventListener('blur', handleBlur);

      setTimeout(() => {
        window.removeEventListener('blur', handleBlur);
        if (!promptFired) {
          showGuideModal('설치 안내', '이미 앱이 설치되어 있거나, 설치 창이 열리지 않는 경우 브라우저 주소창 옆의 <strong>설치 아이콘(＋)</strong> 또는 <strong>[홈 화면에 추가]</strong>를 눌러 수동으로 진행해 주세요.');
        }
      }, 600);
    }
  });

  // 안드로이드용 인앱 브라우저 탈출 로직만 하단에 남김 (기존 안드로이드 탈출 로직 100% 유지)
  if (inAppDetected && /Android/i.test(ua)) {
    const targetUrl = window.location.origin;
    const isGalaxy = /Samsung|Galaxy/i.test(ua) || /samsung/i.test(navigator.vendor || '');
    let intentUrl = isGalaxy 
      ? `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.sec.android.app.sbrowser;end`
      : `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
    
    window.location.href = intentUrl;
    
    const timer = setTimeout(() => {
      const alternateIntent = isGalaxy
        ? `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`
        : `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.sec.android.app.sbrowser;end`;
      window.location.href = alternateIntent;
    }, 800);

    const handleFocusLoss = () => clearTimeout(timer);
    window.addEventListener('blur', handleFocusLoss);
    document.addEventListener('visibilitychange', handleFocusLoss);
  }
</script>
<!-- END: LogicScript -->
