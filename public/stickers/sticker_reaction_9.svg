<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%">
  <defs>
    <!-- Multi-stage blurring filters to build organic, thick neon bloom -->
    <filter id="neonBloom_9" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neonBloom_9)">
    <polygon points="40,8 68,22 68,58 40,72 12,58 12,22" fill="none" stroke="#E040FB" stroke-width="3" stroke-linejoin="round" opacity="0.9" />
    <polygon points="40,8 68,22 68,58 40,72 12,58 12,22" fill="none" stroke="#F48FB1" stroke-width="1.2" stroke-linejoin="round" />
    <text x="40" y="44" 
          text-anchor="middle" 
          dominant-baseline="middle" 
          font-family="'Outfit', 'Inter', sans-serif" 
          font-weight="900" 
          font-size="38" 
          fill="#FFFFFF" 
          stroke="#E040FB" 
          stroke-width="1.8" 
          style="letter-spacing: 0.5px;">헐</text>
  </g>
</svg>