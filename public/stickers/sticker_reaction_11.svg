<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%">
  <defs>
    <!-- Multi-stage blurring filters to build organic, thick neon bloom -->
    <filter id="neonBloom_11" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neonBloom_11)">
    <circle cx="40" cy="40" r="30" fill="none" stroke="#00E676" stroke-dasharray="8 4" stroke-width="3" opacity="0.8" />
    <circle cx="40" cy="40" r="30" fill="none" stroke="#FFF" stroke-width="1.2" />
    <text x="40" y="44" 
          text-anchor="middle" 
          dominant-baseline="middle" 
          font-family="'Outfit', 'Inter', sans-serif" 
          font-weight="900" 
          font-size="26" 
          fill="#FFFFFF" 
          stroke="#00E676" 
          stroke-width="1.8" 
          style="letter-spacing: 0.5px;">GM</text>
  </g>
</svg>