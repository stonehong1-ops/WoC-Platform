<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%">
  <defs>
    <!-- Multi-stage blurring filters to build organic, thick neon bloom -->
    <filter id="neonBloom_12" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neonBloom_12)">
    <rect x="8" y="16" width="64" height="48" rx="8" fill="none" stroke="#2979FF" stroke-width="3" opacity="0.9" />
    <rect x="12" y="20" width="56" height="40" rx="6" fill="none" stroke="#B3E5FC" stroke-width="1" />
    <text x="40" y="44" 
          text-anchor="middle" 
          dominant-baseline="middle" 
          font-family="'Outfit', 'Inter', sans-serif" 
          font-weight="900" 
          font-size="26" 
          fill="#FFFFFF" 
          stroke="#2979FF" 
          stroke-width="1.8" 
          style="letter-spacing: 0.5px;">GN</text>
  </g>
</svg>