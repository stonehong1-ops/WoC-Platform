<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .canvas-bg {
            background: radial-gradient(circle at 50% 50%, #f0f4ff 0%, #faf8ff 100%);
        }
        .swatch-active {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #004ac6;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .swatch-transition {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .swatch-transition:active {
            transform: scale(0.9);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden">
<!-- Fullscreen Overlay Wrapper -->
<div class="fixed inset-0 z-[100] flex flex-col bg-surface overflow-hidden">
<!-- Header / Close Action -->
<header class="flex justify-between items-center px-margin-mobile h-16 z-[110] relative">
<div class="flex items-center gap-stack-sm">
<span class="text-primary font-title-lg font-black tracking-tight">SyncFit</span>
<span class="h-4 w-px bg-outline-variant"></span>
<span class="font-label-md text-on-surface-variant">쇼룸</span>
</div>
<button aria-label="쇼룸 닫기" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Main 3D Canvas / Staging Area -->
<main class="flex-grow relative canvas-bg overflow-hidden flex flex-col">
<!-- 3D Environment (Mocked) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative w-full h-full max-w-md">
<img alt="3D 어패럴 뷰" class="w-full h-full object-contain mix-blend-multiply opacity-90 transition-all duration-700" data-alt="A premium 3D digital render of a minimalist performance jacket displayed on an invisible mannequin. The setting is a clean, hyper-modern digital showroom with soft, diffused top-down lighting and a subtle radial gradient background in shades of ice blue and white. The jacket texture is crisp and technical, reflecting the sophisticated light-mode aesthetic of a high-end corporate design system. The overall mood is professional, precise, and technologically advanced." id="product-display" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2M775m46Uq9oDlRHhW3dHSQ_ITcej4eqfLUA8H3fF72C_SKGp4XRnVUdZOSGMZzg_AhJQbuX_kqmpaLg4O2Z4rvB_R3y4L6nwSBopEIYw0FRkGIxGeHD9ZlXxkvnW1pxfSvy9AtCw4wrx7W9bH8_QLLimItJkjDxlpljAR7xzhKblquRsg1W0jeF43_4MjWl5m_diKVPRy4k3HAmnlmVZZw5vlYdXDQKVT_IOKXVl2giQzkQcnVdS9BzHtgKvYQLC6H-p4T2wvik"/>
<!-- Atmospheric Lighting Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent pointer-events-none"></div>
</div>
</div>
<!-- Perspective Controls -->
<div class="absolute left-margin-mobile top-4 flex flex-col gap-stack-sm">
<button class="w-12 h-12 glass-panel border border-outline-variant rounded-full flex items-center justify-center shadow-sm hover:shadow-md transition-all">
<span class="material-symbols-outlined text-primary">360</span>
</button>
<button class="w-12 h-12 glass-panel border border-outline-variant rounded-full flex items-center justify-center shadow-sm hover:shadow-md transition-all">
<span class="material-symbols-outlined text-on-surface-variant">zoom_in</span>
</button>
</div>
<!-- Tool Drawer / UI Controls -->
<div class="mt-auto z-[105] p-margin-mobile">
<div class="glass-panel border border-outline-variant rounded-xl p-stack-md space-y-stack-lg shadow-xl">
<!-- Fabric Switcher -->
<section>
<h3 class="font-label-md text-on-surface-variant mb-stack-sm uppercase tracking-wider text-[10px]">원단 선택</h3>
<div class="grid grid-cols-2 gap-stack-sm">
<button class="flex items-center gap-stack-md p-3 rounded-lg border-2 border-primary bg-primary-container/10 transition-all">
<div class="w-8 h-8 rounded bg-slate-400 overflow-hidden">
<img alt="피케 코튼" data-alt="Close-up macro photography of a high-quality pique cotton fabric texture. The material shows intricate weaving patterns with a clean, matte finish in a soft neutral grey tone. Lighting is bright and even, highlighting the technical quality of the textile suitable for professional corporate apparel." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaJ_nwpbfg-HsXEtyiAdSEhJomLPQOw3AnW6mUs9j3-BcZTbtY6lpS_n6QevOsvDWgGl6zdx0UZxZ7api2yWEoW5fDG3ftNpDj0AagyNrdb2R9_iztFCkDRZAwThwVBWa_uEZLv0r27nZSt1cA5OGos0Xh2yOkeA2_QEBFD9Fy5FByxey0VVzPN2HL9fHF8k8_qQHLDkgm7L19LyYixExTH49-tTA580pWD1znc1wNIyss6XEoSeYCpAHL9GvNKN1jsf9LBMdMgM0"/>
</div>
<div class="text-left">
<p class="font-label-md text-on-primary-container">테크-피케</p>
<p class="text-[11px] text-on-surface-variant">경량 소재</p>
</div>
</button>
<button class="flex items-center gap-stack-md p-3 rounded-lg border border-outline-variant bg-surface hover:bg-surface-container-low transition-all">
<div class="w-8 h-8 rounded bg-slate-300 overflow-hidden">
<img alt="합성 혼방" data-alt="A detailed macro view of a technical synthetic fabric blend with a subtle sheen and diamond-grid ripstop pattern. The color is a pristine cool white, reflecting a clean and modern aesthetic. The lighting creates gentle shadows in the weave, emphasizing durability and high-performance quality for modern sportswear." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBY7KtHHNZ4_ubLXvSYJ7-QEZRutWA9AZwSpY0Pog_paEL9AFJKPw7Tbz5QRHfX9XjZFaxGNXdojMrDYUmiIAXCxfm8bsqVsptADxCJYu10cXdcGvlHh-5pBDrptte20YrJHTb-WmYXPg6vj6x46q0WW7BzGAmZEE-Bfb1DI7hIEG3HoO3nNO1sjyvrWPEQ5aF_7DcWVjEaWPgEsBGt7aSWWSscd_tzZUXOH4oPU9kmqDHxTCqrOiBaFhUvSnVxeTecNUgZfkH1Nmk"/>
</div>
<div class="text-left">
<p class="font-label-md text-on-surface">플렉스-브레이드</p>
<p class="text-[11px] text-on-surface-variant">컴프레션</p>
</div>
</button>
</div>
</section>
<!-- Color Swatches -->
<section>
<h3 class="font-label-md text-on-surface-variant mb-stack-sm uppercase tracking-wider text-[10px]">컬러 팔레트</h3>
<div class="flex items-center gap-4 py-1">
<button class="swatch-active w-10 h-10 rounded-full bg-[#131b2e] swatch-transition" title="미드나잇 네이비"></button>
<button class="w-10 h-10 rounded-full bg-[#5c5f61] swatch-transition" title="슬레이트 그레이"></button>
<button class="w-10 h-10 rounded-full bg-[#004ac6] swatch-transition" title="로열 블루"></button>
<button class="w-10 h-10 rounded-full bg-[#faf8ff] border border-outline-variant swatch-transition" title="스타크 화이트"></button>
<button class="w-10 h-10 rounded-full bg-[#ab0b1c] swatch-transition" title="크림슨 레드"></button>
<button class="flex items-center justify-center w-10 h-10 rounded-full border border-dashed border-outline text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</section>
<!-- Metadata -->
<div class="flex justify-between items-center py-2 border-t border-outline-variant/30">
<div>
<p class="font-label-md text-on-surface">예상 단가</p>
<p class="font-headline-md text-primary">₩58,500</p>
</div>
<div class="text-right">
<p class="font-label-md text-on-surface">리드 타임</p>
<p class="font-body-sm text-on-surface-variant">14-21일</p>
</div>
</div>
<!-- CTA Action -->
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-md py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-stack-sm">
<span>생산 확정하기</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Status Bar Mimic -->
<div class="h-2 bg-surface"></div>
</div>
<!-- Micro-interaction Scripts -->
<script>
        document.querySelectorAll('.swatch-transition').forEach(swatch => {
            swatch.addEventListener('click', function() {
                // Remove active class from others
                document.querySelectorAll('.swatch-transition').forEach(s => s.classList.remove('swatch-active'));
                // Add to current
                this.classList.add('swatch-active');
                
                // Mock color change effect
                const productImg = document.getElementById('product-display');
                productImg.style.opacity = '0';
                setTimeout(() => {
                    productImg.style.opacity = '0.9';
                }, 150);
            });
        });

        // Fabric selection toggle
        const fabricButtons = document.querySelectorAll('section:first-of-type button');
        fabricButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                fabricButtons.forEach(b => {
                    b.classList.remove('border-primary', 'bg-primary-container/10');
                    b.classList.add('border-outline-variant', 'bg-surface');
                    b.querySelector('p:first-of-type').classList.remove('text-on-primary-container');
                    b.querySelector('p:first-of-type').classList.add('text-on-surface');
                });
                this.classList.remove('border-outline-variant', 'bg-surface');
                this.classList.add('border-primary', 'bg-primary-container/10');
                this.querySelector('p:first-of-type').classList.remove('text-on-surface');
                this.querySelector('p:first-of-type').classList.add('text-on-primary-container');
            });
        });
    </script>
</body></html>
