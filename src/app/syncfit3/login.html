<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>

            max-height: 1000px;
            opacity: 1;
            margin-top: 12px;
        }
        .accordion-item.active .chevron {
            transform: rotate(180deg);
        }
        .role-card:active {
            transform: scale(0.98);
        }
    </style>

                "on-primary-fixed-variant": "#003ea8",

                "surface": "#faf8ff",
                "on-primary": "#ffffff",
                "on-primary-container": "#eeefff",
                "secondary-fixed": "#e0e3e5",

                "primary-fixed": "#dbe1ff",
                "secondary": "#5c5f61",
                "on-tertiary-fixed": "#410004",
                "primary-fixed-dim": "#b4c5ff",
                "on-surface-variant": "#434655",
                "inverse-primary": "#b4c5ff",
                "inverse-surface": "#283044",
                "tertiary-fixed-dim": "#ffb3ad",
                "surface-container-low": "#f2f3ff",
                "on-error": "#ffffff",
                "on-tertiary-fixed-variant": "#930013",
                "outline": "#737686",
                "surface-container": "#eaedff",
                "on-tertiary": "#ffffff",

<style>
        body {
            min-height: max(884px, 100dvh);
        }

<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col">
<!-- Login screen header -->
<header class="w-full pt-12 pb-8 px-margin-mobile flex flex-col items-center text-center">
<div class="mb-6">
<span class="text-primary text-[40px] font-black tracking-tighter">SyncFit</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-2">다시 오신 것을 환영합니다</h1>
<p class="font-body-md text-on-surface-variant max-w-[280px]">라이프사이클 대시보드에 접속하려면 프로필을 선택해 주세요.</p>
</header>
<main class="flex-grow px-margin-mobile pb-12 overflow-y-auto">
<div class="space-y-4 max-w-md mx-auto">
<!-- Admin Role Accordion -->
<div class="accordion-item bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden transition-all duration-200">
<button class="w-full flex items-center justify-between p-stack-md" onclick="toggleAccordion(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary-container/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
</div>
<div class="text-left">
<h3 class="font-title-lg text-title-lg">관리자</h3>
<p class="font-body-sm text-on-surface-variant">글로벌 통합 관리</p>
</div>
</div>
<span class="chevron material-symbols-outlined text-outline transition-transform duration-300">expand_more</span>
</button>
<div class="accordion-content px-stack-md pb-stack-md">
<div class="grid grid-cols-1 gap-2">
<button class="role-card flex items-center p-stack-md bg-surface hover:bg-surface-container-high border border-outline-variant rounded-lg transition-all" onclick="navigateToStyleList('KR Manager')">
<span class="material-symbols-outlined mr-3 text-secondary">shield_person</span>
<span class="font-label-md text-label-md">한국 관리자</span>
</button>
<button class="role-card flex items-center p-stack-md bg-surface hover:bg-surface-container-high border border-outline-variant rounded-lg transition-all" onclick="navigateToStyleList('CN Manager')">
<span class="material-symbols-outlined mr-3 text-secondary">shield_person</span>
<span class="font-label-md text-label-md">중국 관리자</span>
</button>
</div>
</div>
</div>
<!-- Designer Role Accordion -->
<div class="accordion-item bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden transition-all duration-200">
<button class="w-full flex items-center justify-between p-stack-md" onclick="toggleAccordion(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary-container/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">palette</span>
</div>
<div class="text-left">
<h3 class="font-title-lg text-title-lg">디자이너</h3>
<p class="font-body-sm text-on-surface-variant">제품 크리에이티브</p>
</div>
</div>
<span class="chevron material-symbols-outlined text-outline transition-transform duration-300">expand_more</span>
</button>
<div class="accordion-content px-stack-md pb-stack-md">
<div class="grid grid-cols-1 gap-2">
<button class="role-card flex items-center p-stack-md bg-surface hover:bg-surface-container-high border border-outline-variant rounded-lg transition-all" onclick="navigateToStyleList('Designer 1')">
<span class="material-symbols-outlined mr-3 text-secondary">person</span>
<span class="font-label-md text-label-md">디자이너 1</span>
</button>
<button class="role-card flex items-center p-stack-md bg-surface hover:bg-surface-container-high border border-outline-variant rounded-lg transition-all" onclick="navigateToStyleList('Designer 2')">
<span class="material-symbols-outlined mr-3 text-secondary">person</span>
<span class="font-label-md text-label-md">디자이너 2</span>
</button>
<button class="role-card flex items-center p-stack-md bg-surface hover:bg-surface-container-high border border-outline-variant rounded-lg transition-all" onclick="navigateToStyleList('Designer 3')">
<span class="material-symbols-outlined mr-3 text-secondary">person</span>
<span class="font-label-md text-label-md">디자이너 3</span>
</button>
</div>
</div>
</div>
<!-- Factory Staff Accordion -->
<div class="accordion-item bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden transition-all duration-200">
<button class="w-full flex items-center justify-between p-stack-md" onclick="toggleAccordion(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary-container/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">factory</span>
</div>
<div class="text-left">
<h3 class="font-title-lg text-title-lg">공장 직원</h3>
<p class="font-body-sm text-on-surface-variant">10개 활성 프로필</p>
</div>
</div>
<span class="chevron material-symbols-outlined text-outline transition-transform duration-300">expand_more</span>
</button>
<div class="accordion-content px-stack-md pb-stack-md">
<div class="grid grid-cols-2 gap-2" id="factory-grid">
<!-- Generated by JS -->
</div>
</div>
</div>
<!-- Vendor Staff Accordion -->
<div class="accordion-item bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden transition-all duration-200">
<button class="w-full flex items-center justify-between p-stack-md" onclick="toggleAccordion(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary-container/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">inventory</span>
</div>
<div class="text-left">
<h3 class="font-title-lg text-title-lg">협력사 직원</h3>
<p class="font-body-sm text-on-surface-variant">30개 활성 프로필</p>
</div>
</div>
<span class="chevron material-symbols-outlined text-outline transition-transform duration-300">expand_more</span>
</button>
<div class="accordion-content px-stack-md pb-stack-md">
<div class="grid grid-cols-2 gap-2" id="vendor-grid">
<!-- Generated by JS -->
</div>
</div>
</div>
</div>
</main>
<!-- Visual Anchor - Atmospheric Image -->
<div class="mt-auto px-margin-mobile pb-margin-mobile">
<div class="relative w-full h-32 rounded-2xl overflow-hidden">
<img alt="작업 공간 배경" class="w-full h-full object-cover grayscale opacity-20 contrast-125" data-alt="A clean professional minimalist industrial design workspace with blueprint papers and high-end tech devices. The lighting is soft and neutral light mode style with shades of slate and white. The atmosphere is quiet, organized, and focused on systematic excellence for high-performance corporate teams." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBUnDS6x89NvmkmZ3gCXLtiFYSegf1tULjaGa_2UDxOH1XI3bkzPeGHSQqkYBEa9lzFWdnD5F67RaDrsB9hgchF1yyRX7AzgdcnRmMFdkAbY2UGyueQkO4pizNhq68reMdv9q6BTgg-mkDvnT_yPggOUFmFL-c-vci0R_bg50sJFISj9zNu9jhmg7uHGZLtpI7_BAwDJBPzycPcgbiABXv08plhMxEOdEFWlasmOgrz6plk95EHI6ATvJ_2wddyjgnqNwoXM4lQSSs"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent"></div>
</div>
</div>
<script>
    // Populate Factory & Vendor grids
    const factoryGrid = document.getElementById('factory-grid');
    for (let i = 1; i <= 10; i++) {
        factoryGrid.innerHTML += `
            <button onclick="navigateToStyleList('공장 직원 ${i}')" class="role-card flex items-center p-stack-md bg-surface hover:bg-surface-container-high border border-outline-variant rounded-lg transition-all">
                <span class="material-symbols-outlined mr-2 text-secondary text-sm">precision_manufacturing</span>
                <span class="font-label-md text-label-md text-xs">직원 ${i}</span>
            </button>
        `;
    }

    const vendorGrid = document.getElementById('vendor-grid');
    for (let i = 1; i <= 30; i++) {
        vendorGrid.innerHTML += `
            <button onclick="navigateToStyleList('협력사 직원 ${i}')" class="role-card flex items-center p-stack-md bg-surface hover:bg-surface-container-high border border-outline-variant rounded-lg transition-all">
                <span class="material-symbols-outlined mr-2 text-secondary text-sm">storefront</span>
                <span class="font-label-md text-label-md text-xs">협력사 ${i}</span>
            </button>
        `;
    }

    function toggleAccordion(btn) {
        const item = btn.parentElement;
        const isActive = item.classList.contains('active');
        
        // Close all first
        document.querySelectorAll('.accordion-item').forEach(i => {
            i.classList.remove('active');
        });

        // Open clicked if it wasn't active
        if (!isActive) {
            item.classList.add('active');
        }
    }

    function navigateToStyleList(role) {
        // Micro-interaction feedback
        console.log(`인증 중: ${role}`);
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.4s ease';
        setTimeout(() => {
            alert(`${role}님, 로그인 성공. 스타일 목록으로 이동합니다...`);
            // location.href = '/style-list'; // Simulated navigation
        }, 300);
    }
</script>
</body></html>
